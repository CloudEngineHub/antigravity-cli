name:  Antigravity CLI - Feature Request
description: Propose a new feature or improvement for Antigravity CLI
title: "[Feature Request]: "
labels: ["type: feature request"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > Thanks for taking the time to fill out this bug report!
        >
        > Please search **[existing issues](https://github.com/google-antigravity/antigravity-cli/issues)** to see if a similar feature has been requested
  - type: textarea
    id: pitch
    attributes:
      label: Is your feature request related to a specific problem?
      description: A clear and concise description of what the problem is
      placeholder: Describe the problem or limitation...
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen
      placeholder: Describe your proposed feature or improvement...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered
      placeholder: What other solutions did you think of?
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context, CLI output examples, screenshots about the feature request here
